<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Previous Year Questions</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main class="page-shell">
        <div class="page-header">
            <div>
                <p class="eyebrow">
                    <i data-lucide="file-stack"></i>
                    Exam pattern practice
                </p>
                <h1 class="page-title">Previous Year Question Papers</h1>
                <p class="page-copy">Browse only previous year question papers, grouped cleanly by subject.</p>
            </div>
            <a class="button-ghost" href="front.html">Back to Dashboard</a>
        </div>

        <section class="study-shell">
            <div class="subject-list" id="subjectList"></div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (character) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            }[character]));
        }

        async function loadSubjects() {
            try {
                const response = await fetch(buildApiUrl('/pyqs'));
                const data = await response.json();
                const subjectList = document.getElementById('subjectList');
                const subjects = data.subjects || [];

                subjectList.innerHTML = '';

                if (!subjects.length) {
                    subjectList.innerHTML = '<p>No PYQ papers available yet.</p>';
                    return;
                }

                subjects.forEach((subject) => {
                    const subjectCard = document.createElement('div');
                    subjectCard.className = 'subject-card stacked';

                    subjectCard.innerHTML = `
                        <div class="subject-main">
                            <div class="subject-icon"><i data-lucide="file-question"></i></div>
                            <div>
                                <h3>${escapeHtml(subject.name)}</h3>
                                <p>${subject.subject_code ? `${escapeHtml(subject.subject_code)} - ` : ''}${subject.papers.length} PYQ paper${subject.papers.length === 1 ? '' : 's'} - ${subject.question_count || 0} extracted question${subject.question_count === 1 ? '' : 's'}</p>
                            </div>
                        </div>
                        <div class="study-links pyq-paper-list">
                            ${subject.papers.map((paper) => `
                                <div class="pyq-paper-row">
                                    <span class="resource-chip pyq-paper-title">${paper.year ? `PYQ ${escapeHtml(paper.year)}` : 'PYQ'} - ${escapeHtml(paper.name)} (${paper.question_count || 0} questions)</span>
                                    <div class="pyq-paper-actions">
                                        <a class="resource-chip" href="${buildDataUrl(paper.path)}" target="_blank" rel="noopener noreferrer">View</a>
                                        <a class="resource-chip" href="${buildDataUrl(paper.path)}" download>Download</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    subjectList.appendChild(subjectCard);
                });

                lucide.createIcons();
            } catch (error) {
                console.error('Error loading PYQ papers:', error);
                document.getElementById('subjectList').innerHTML = '<p>Error loading PYQ papers.</p>';
            }
        }

        loadSubjects();
    </script>
</body>

</html>
