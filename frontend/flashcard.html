<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main class="page-shell">
        <div class="page-header">
            <div>
                <p class="eyebrow">
                    <i data-lucide="layers-3"></i>
                    Active recall
                </p>
                <h1 class="page-title">KTU Flashcards</h1>
                <p class="page-copy">Generate flashcards for quick revision.</p>
            </div>
            <a class="button-ghost" href="front.html">Back to Dashboard</a>
        </div>

        <section class="study-shell" id="flashcardSection">
            <div id="generateForm">
                <h2>Generate Flashcards</h2>
                <div class="field">
                    <label for="subject">Subject</label>
                    <select id="subject" required>
                        <option value="">Select a subject</option>
                    </select>
                </div>
                <div class="field" style="margin-top: 14px;">
                    <label for="moduleNumber">Module Number</label>
                    <select id="moduleNumber">
                        <option value="">All modules / PYQ-focused</option>
                        <option value="1">Module 1</option>
                        <option value="2">Module 2</option>
                        <option value="3">Module 3</option>
                        <option value="4">Module 4</option>
                        <option value="5">Module 5</option>
                    </select>
                </div>
                <div class="field" style="margin-top: 14px;">
                    <label for="numCards">Number of Cards</label>
                    <input type="number" id="numCards" min="1" max="50" value="20" required>
                </div>
                <div id="subjectResources" class="study-links" hidden></div>
                <button class="button" style="margin-top: 18px;" onclick="generateFlashcards()">Generate Flashcards</button>
                <button class="button-secondary" style="margin-top: 18px;" onclick="generateFlashcards(true)">Regenerate</button>
            </div>

            <div id="flashcardContent" style="display: none;">
                <div class="flashcard-wrap">
                    <button class="button-secondary" style="margin-bottom: 14px;" onclick="generateFlashcards(true)">Regenerate Flashcards</button>
                    <div class="flashcard-stage">
                        <div class="flashcard" id="card" onclick="flipCard()">
                            <div class="card-face front" id="frontText"></div>
                            <div class="card-face back" id="backText"></div>
                        </div>
                    </div>

                    <div class="flash-controls">
                        <button class="button-secondary flash-btn" onclick="prevCard()">Previous</button>
                        <button class="button flash-btn" onclick="nextCard()">Next</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        let flashcards = [];
        let currentIndex = 0;
        let availableSubjects = [];

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (character) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            }[character]));
        }

        async function loadSubjects() {
            try {
                const response = await fetch(buildApiUrl('/subjects'));
                const data = await response.json();
                availableSubjects = data.subjects || [];
                const select = document.getElementById('subject');

                availableSubjects.forEach((subject) => {
                    const option = document.createElement('option');
                    option.value = subject.name;
                    option.textContent = subject.code ? `${subject.name} (${subject.code})` : subject.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading subjects:', error);
            }
        }

        function renderSubjectResources(subjectName) {
            const resources = document.getElementById('subjectResources');
            const subject = availableSubjects.find((item) => item.name === subjectName);

            if (!subject || !subject.files?.length) {
                resources.hidden = true;
                resources.innerHTML = '';
                return;
            }

                resources.hidden = false;
                resources.innerHTML = `
                <strong>Use these notes while revising ${escapeHtml(subject.name)}</strong>
                ${subject.files.map((file) => `
                    <a class="resource-chip" href="${buildDataUrl(file.path)}" target="_blank" rel="noopener noreferrer">${escapeHtml(file.name)}</a>
                `).join('')}
            `;
        }

        async function generateFlashcards(regenerate = false) {
            const subject = document.getElementById('subject').value.trim();
            const moduleNumber = document.getElementById('moduleNumber').value;
            const numCards = document.getElementById('numCards').value;

            if (!subject) {
                alert('Please select a subject.');
                return;
            }

            try {
                const response = await fetch(buildApiUrl('/generate-flashcard'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getStoredToken()}`
                    },
                    body: JSON.stringify({
                        subject: subject,
                        module_number: moduleNumber ? parseInt(moduleNumber) : null,
                        num_cards: parseInt(numCards),
                        regenerate: Boolean(regenerate)
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Parse the generated flashcards
                    // Assuming the response is formatted as "Question: ... Answer: ..." etc.
                    flashcards = parseFlashcards(data.flashcards);
                    currentIndex = 0;

                    document.getElementById('generateForm').style.display = 'none';
                    document.getElementById('flashcardContent').style.display = 'block';

                    loadCard();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.detail);
                }
            } catch (error) {
                console.error('Error generating flashcards:', error);
                alert('Error generating flashcards. Please try again.');
            }
        }

        function parseFlashcards(content) {
            const cards = [];
            const lines = content.split('\n');
            let currentCard = {};

            for (const line of lines) {
                const frontMatch = line.match(/^\s*(?:\d+[\).\s-]*)?(?:Question|Q|Term):\s*(.+)$/i);
                const backMatch = line.match(/^\s*(?:Answer|A|Definition):\s*(.+)$/i);

                if (frontMatch) {
                    if (currentCard.question) {
                        cards.push(currentCard);
                    }
                    currentCard = { question: frontMatch[1].trim(), answer: '' };
                } else if (backMatch) {
                    currentCard.answer = backMatch[1].trim();
                }
            }

            if (currentCard.question) {
                cards.push(currentCard);
            }

            return cards.length > 0 ? cards : [{ question: 'Generated Flashcards', answer: content }];
        }

        function loadCard() {
            if (flashcards.length > 0) {
                document.getElementById("frontText").innerText = flashcards[currentIndex].question;
                document.getElementById("backText").innerText = flashcards[currentIndex].answer;
                document.getElementById("card").classList.remove("flip");
            }
        }

        function flipCard() {
            document.getElementById("card").classList.toggle("flip");
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % flashcards.length;
            loadCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
            loadCard();
        }

        document.getElementById('subject').addEventListener('change', (event) => {
            renderSubjectResources(event.target.value);
        });

        loadSubjects();
    </script>
</body>

</html>
